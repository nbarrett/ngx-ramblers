name: Deploy and Build Docker Image and Deploy to Fly.io

on:
  push:
    branches: [ "main", "pre-main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: '24.14.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      chrome_version: ${{ steps.vars.outputs.chrome_version }}
      auto_deploy_target: ${{ steps.vars.outputs.auto_deploy_target }}
      auto_deploy_app_name: ${{ steps.vars.outputs.auto_deploy_app_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Install server dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000
        working-directory: ./server

      - name: Resolve build-time variables from database
        id: vars
        env:
          ADMIN_MONGODB_URI: ${{ secrets.ADMIN_MONGODB_URI }}
        run: ./server/node_modules/.bin/tsx server/deploy/resolve-build-time-vars.ts

  test:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Install server dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000
        working-directory: ./server

      - name: Run lint checks (frontend + server)
        run: npm run lint:all

      - name: Setup Chrome for headless tests
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: ${{ needs.resolve.outputs.chrome_version }}

      - name: Export CHROME_BIN for Karma
        run: echo "CHROME_BIN=$CHROME_PATH" >> $GITHUB_ENV

      - name: Set timezone for tests
        run: echo "TZ=Europe/London" >> $GITHUB_ENV

      - name: Run frontend unit tests (headless)
        run: npm run test

      - name: Run server unit tests
        run: npm run test:server

  deploy:
    needs: [resolve, test]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-group
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Install server dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000
        working-directory: ./server

      - name: Detect worker-relevant changes
        id: worker-changes
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: ./server/node_modules/.bin/tsx server/deploy/detect-worker-changes.ts

      - name: Install ts-node
        run: npm install -g ts-node

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin

      - name: Build the Docker image
        run: docker build . --file Dockerfile --target website --tag ngx-ramblers:${{ github.run_number }}

      - name: Tag the Docker image (latest)
        if: github.ref_name == 'main'
        run: docker tag ngx-ramblers:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers:latest

      - name: Push the Docker image to Docker Hub (latest)
        if: github.ref_name == 'main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers:latest

      - name: Tag the Docker image (github run number ${{ github.run_number }})
        run: docker tag ngx-ramblers:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers:${{ github.run_number }}

      - name: Push the Docker image to Docker Hub (github run number ${{ github.run_number }})
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers:${{ github.run_number }}

      - name: Build the worker Docker image (Serenity/JS base)
        if: github.event_name == 'push' && steps.worker-changes.outputs.worker == 'true'
        run: docker build . --build-arg CHROME_VERSION=${{ needs.resolve.outputs.chrome_version }} --file Dockerfile --target worker --tag ngx-ramblers-integration-worker:${{ github.run_number }}

      - name: Tag the worker Docker image (integration-worker-${{ github.run_number }})
        if: github.event_name == 'push' && steps.worker-changes.outputs.worker == 'true'
        run: docker tag ngx-ramblers-integration-worker:${{ github.run_number }} ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers:integration-worker-${{ github.run_number }}

      - name: Push the worker Docker image to Docker Hub (integration-worker-${{ github.run_number }})
        if: github.event_name == 'push' && steps.worker-changes.outputs.worker == 'true'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers:integration-worker-${{ github.run_number }}

      - name: Install Flyctl
        run: |
          curl -fsSL https://fly.io/install.sh | FLYCTL_INSTALL="$HOME/.fly" sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Verify Flyctl installation
        run: flyctl version

      - name: Deploy image ngx-ramblers:${{ github.run_number }} to fly.io
        timeout-minutes: 15
        env:
          ADMIN_MONGODB_URI: ${{ secrets.ADMIN_MONGODB_URI }}
        run: |
          ts-node server/deploy/deploy-to-environments.ts --environment "${{ needs.resolve.outputs.auto_deploy_target }}" --image-tag "${{ github.run_number }}"

      - name: Deploy Ramblers upload worker
        if: github.event_name == 'push' && steps.worker-changes.outputs.worker == 'true'
        timeout-minutes: 15
        env:
          ADMIN_MONGODB_URI: ${{ secrets.ADMIN_MONGODB_URI }}
          INTEGRATION_WORKER_IMAGE_REPOSITORY: ${{ secrets.DOCKER_USERNAME }}/ngx-ramblers
        run: |
          ts-node server/deploy/deploy-integration-worker.ts --image-tag "integration-worker-${{ github.run_number }}"

      - name: Generate Release Notes
        if: github.ref_name == 'main' && github.event_name == 'push'
        env:
          CMS_USERNAME: ${{ secrets.CMS_USERNAME }}
          CMS_PASSWORD: ${{ secrets.CMS_PASSWORD }}
          PREV_SHA: ${{ github.event.before }}
        run: |
          cd server
          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous push SHA available - falling back to --latest"
            npm run release-notes -- --latest --build-number ${{ github.run_number }} --include-unassigned
          else
            echo "Generating release notes for commits since $PREV_SHA"
            npm run release-notes -- --since "$PREV_SHA" --build-number ${{ github.run_number }} --include-unassigned
          fi

name: Deploy to Selected Environments

on:
  workflow_dispatch:
    inputs:
      environments:
        description: 'Select environments to deploy to (space-separated or "all")'
        required: true
        default: 'all'
        type: string
      image_tag:
        description: 'Docker image tag to deploy (e.g., latest or a previous run number)'
        required: true
        default: 'latest'
        type: string

env:
  NODE_VERSION: '24.14.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  set-environments:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Install server dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000
        working-directory: ./server

      - name: Resolve environment matrix from database
        id: set-matrix
        env:
          ADMIN_MONGODB_URI: ${{ secrets.ADMIN_MONGODB_URI }}
        run: |
          if [ "${{ github.event.inputs.environments }}" = "all" ]; then
            MATRIX=$(./server/node_modules/.bin/tsx server/deploy/list-environment-names.ts 2>/dev/null | tail -n 1)
          else
            MATRIX='["'$(echo "${{ github.event.inputs.environments }}" | sed 's/ /","/g')'"]'
          fi
          echo "Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  deploy:
    needs: set-environments
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        environment: ${{ fromJson(needs.set-environments.outputs.matrix) }}
    name: Deploy to ${{ matrix.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Install server dependencies
        run: npm ci --fetch-retries=5 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000
        working-directory: ./server

      - name: Install ts-node
        run: npm install -g ts-node

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin

      - name: Install Flyctl
        run: |
          curl -fsSL https://fly.io/install.sh | FLYCTL_INSTALL="$HOME/.fly" sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Verify Flyctl Installation
        run: |
          echo "Flyctl path: $(which flyctl)"
          flyctl version
          echo "FLYCTL_PATH=$(which flyctl)" >> $GITHUB_ENV

      - name: Deploy to ${{ matrix.environment }}
        env:
          ADMIN_MONGODB_URI: ${{ secrets.ADMIN_MONGODB_URI }}
        run: |
          ts-node server/deploy/deploy-to-environments.ts --environment "${{ matrix.environment }}" --image-tag "${{ github.event.inputs.image_tag }}"

